<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="766" viewBox="0 0 1800 766" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="svga-monda-title svga-monda-desc">
  <title id="svga-monda-title">AI Infra 全景地图</title>
  <desc id="svga-monda-desc">AI 基础设施四层架构全景封面图</desc>

  <defs>
    <linearGradient id="svga-monda-bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0B"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </linearGradient>
    <linearGradient id="svga-monda-blue-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="svga-monda-purple-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
    <filter id="svga-monda-blur-lg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1800" height="766" fill="url(#svga-monda-bg-grad)"/>

  <!-- Grid pattern -->
  <g opacity="0.3">
    <line x1="0" y1="191" x2="1800" y2="191" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="383" x2="1800" y2="383" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="575" x2="1800" y2="575" stroke="#1E293B" stroke-width="1"/>
    <line x1="225" y1="0" x2="225" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="675" y1="0" x2="675" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="1125" y1="0" x2="1125" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="1350" y1="0" x2="1350" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="1575" y1="0" x2="1575" y2="766" stroke="#1E293B" stroke-width="1"/>
  </g>

  <!-- Glow accents -->
  <rect x="300" y="200" width="1200" height="400" fill="url(#svga-monda-blue-glow)" filter="url(#svga-monda-blur-lg)"/>
  <rect x="600" y="100" width="600" height="600" fill="url(#svga-monda-purple-glow)" filter="url(#svga-monda-blur-lg)"/>

  <!-- Main title -->
  <text x="900" y="200" text-anchor="middle" font-family="Inter, PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="108" font-weight="800" fill="#F8FAFC" letter-spacing="2">
    AI Infra
  </text>
  <text x="900" y="290" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, Microsoft YaHei, system-ui, sans-serif" font-size="56" font-weight="700" fill="#F8FAFC">
    全景地图
  </text>

  <!-- Subtitle -->
  <text x="900" y="345" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, Microsoft YaHei, system-ui, sans-serif" font-size="28" font-weight="400" fill="#94A3B8">
    算力底座的四层架构与范式演进
  </text>

  <!-- Four layer cards -->
  <!-- Card 1: Hardware -->
  <rect x="250" y="420" width="300" height="120" rx="16" fill="#1A1D24" stroke="#3B82F6" stroke-width="2"/>
  <rect x="250" y="420" width="300" height="4" rx="2" fill="#3B82F6"/>
  <text x="400" y="465" text-anchor="middle" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="28" font-weight="700" fill="#3B82F6">Hardware</text>
  <text x="400" y="500" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="20" fill="#94A3B8">GPU · CPU · NPU · DPU</text>
  <text x="400" y="525" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="18" fill="#64748B">NVIDIA · AMD · Intel</text>

  <!-- Card 2: Network -->
  <rect x="600" y="420" width="300" height="120" rx="16" fill="#1A1D24" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="600" y="420" width="300" height="4" rx="2" fill="#8B5CF6"/>
  <text x="750" y="465" text-anchor="middle" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="28" font-weight="700" fill="#8B5CF6">Network</text>
  <text x="750" y="500" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="20" fill="#94A3B8">InfiniBand · RoCE</text>
  <text x="750" y="525" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="18" fill="#64748B">NVLink · PCIe · CXL</text>

  <!-- Card 3: Storage -->
  <rect x="950" y="420" width="300" height="120" rx="16" fill="#1A1D24" stroke="#10B981" stroke-width="2"/>
  <rect x="950" y="420" width="300" height="4" rx="2" fill="#10B981"/>
  <text x="1100" y="465" text-anchor="middle" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="28" font-weight="700" fill="#10B981">Storage</text>
  <text x="1100" y="500" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="20" fill="#94A3B8">HBM3 · DDR5 · NVMe</text>
  <text x="1100" y="525" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="18" fill="#64748B">内存池化 · 先进封装</text>

  <!-- Card 4: Software -->
  <rect x="1300" y="420" width="300" height="120" rx="16" fill="#1A1D24" stroke="#F59E0B" stroke-width="2"/>
  <rect x="1300" y="420" width="300" height="4" rx="2" fill="#F59E0B"/>
  <text x="1450" y="465" text-anchor="middle" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="28" font-weight="700" fill="#F59E0B">Software</text>
  <text x="1450" y="500" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="20" fill="#94A3B8">CUDA · ROCm · oneAPI</text>
  <text x="1450" y="525" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="18" fill="#64748B">PyTorch · TensorRT · vLLM</text>

  <!-- Bottom tag line -->
  <text x="900" y="640" text-anchor="middle" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="22" font-weight="600" fill="#475569">
    硬件 × 网络 × 存储 × 软件栈 = 大模型时代的算力基座
  </text>

  <!-- Decorative circuit lines -->
  <path d="M 150 600 Q 200 580 250 540" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.4"/>
  <path d="M 1650 600 Q 1600 580 1550 540" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4"/>
  <circle cx="150" cy="600" r="4" fill="#3B82F6" opacity="0.6"/>
  <circle cx="1650" cy="600" r="4" fill="#8B5CF6" opacity="0.6"/>

  <!-- Corner markers -->
  <rect x="40" y="40" width="3" height="30" fill="#3B82F6" opacity="0.5"/>
  <rect x="40" y="40" width="30" height="3" fill="#3B82F6" opacity="0.5"/>
  <rect x="1757" y="40" width="3" height="30" fill="#8B5CF6" opacity="0.5"/>
  <rect x="1730" y="40" width="30" height="3" fill="#8B5CF6" opacity="0.5"/>
  <rect x="40" y="696" width="3" height="30" fill="#8B5CF6" opacity="0.5"/>
  <rect x="40" y="723" width="30" height="3" fill="#8B5CF6" opacity="0.5"/>
  <rect x="1757" y="696" width="3" height="30" fill="#3B82F6" opacity="0.5"/>
  <rect x="1730" y="723" width="30" height="3" fill="#3B82F6" opacity="0.5"/>
</svg>
