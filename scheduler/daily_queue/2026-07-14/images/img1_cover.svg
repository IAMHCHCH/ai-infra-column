<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="766" viewBox="0 0 1800 766">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#101830"/>
    </linearGradient>
    <linearGradient id="nvGreen" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1800" height="766" fill="url(#bgGrad)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#00ff88" stroke-width="1">
    <line x1="0" y1="100" x2="1800" y2="100"/>
    <line x1="0" y1="200" x2="1800" y2="200"/>
    <line x1="0" y1="300" x2="1800" y2="300"/>
    <line x1="0" y1="400" x2="1800" y2="400"/>
    <line x1="0" y1="500" x2="1800" y2="500"/>
    <line x1="0" y1="600" x2="1800" y2="600"/>
    <line x1="300" y1="0" x2="300" y2="766"/>
    <line x1="600" y1="0" x2="600" y2="766"/>
    <line x1="900" y1="0" x2="900" y2="766"/>
    <line x1="1200" y1="0" x2="1200" y2="766"/>
    <line x1="1500" y1="0" x2="1500" y2="766"/>
  </g>
  <!-- Top accent line -->
  <rect x="0" y="0" width="1800" height="4" fill="url(#nvGreen)"/>
  <!-- Left accent bar -->
  <rect x="80" y="120" width="6" height="80" fill="#00ff88" filter="url(#glow)"/>
  <!-- Main title -->
  <text x="110" y="175" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    NVLink 4.0
  </text>
  <text x="110" y="230" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="500" fill="#00ff88" letter-spacing="-0.5">
    到底有多快？
  </text>
  <!-- Right side: GPU visualization -->
  <g transform="translate(1150, 130)">
    <!-- GPU cards -->
    <g id="gpu1">
      <rect x="0" y="0" width="120" height="80" rx="8" fill="#1a2540" stroke="#00ff88" stroke-width="1.5"/>
      <text x="60" y="35" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88">GPU 0</text>
      <text x="60" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">H100</text>
    </g>
    <g id="gpu2">
      <rect x="0" y="120" width="120" height="80" rx="8" fill="#1a2540" stroke="#00ff88" stroke-width="1.5"/>
      <text x="60" y="155" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88">GPU 1</text>
      <text x="60" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">H100</text>
    </g>
    <g id="gpu3">
      <rect x="0" y="240" width="120" height="80" rx="8" fill="#1a2540" stroke="#00ff88" stroke-width="1.5"/>
      <text x="60" y="275" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88">GPU 2</text>
      <text x="60" y="295" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">H100</text>
    </g>
    <g id="gpu4">
      <rect x="0" y="360" width="120" height="80" rx="8" fill="#1a2540" stroke="#00ff88" stroke-width="1.5"/>
      <text x="60" y="395" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88">GPU 3</text>
      <text x="60" y="415" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">H100</text>
    </g>
    <!-- NVSwitch in middle -->
    <rect x="200" y="160" width="140" height="120" rx="12" fill="#0d1f3c" stroke="#00ff88" stroke-width="2" filter="url(#glow)"/>
    <text x="270" y="210" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#00ff88">NVSwitch</text>
    <text x="270" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#666">L2 Switch</text>
    <text x="270" y="252" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">36-port</text>
    <!-- Connection lines -->
    <g stroke="#00ff88" stroke-width="1.5" opacity="0.6">
      <line x1="120" y1="40" x2="200" y2="180"/>
      <line x1="120" y1="160" x2="200" y2="200"/>
      <line x1="120" y1="280" x2="200" y2="240"/>
      <line x1="120" y1="400" x2="200" y2="260"/>
    </g>
    <!-- Right side GPUs -->
    <g id="gpu5">
      <rect x="420" y="0" width="120" height="80" rx="8" fill="#1a2540" stroke="#00ff88" stroke-width="1.5"/>
      <text x="480" y="35" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88">GPU 4</text>
      <text x="480" y="55" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">H100</text>
    </g>
    <g id="gpu6">
      <rect x="420" y="120" width="120" height="80" rx="8" fill="#1a2540" stroke="#00ff88" stroke-width="1.5"/>
      <text x="480" y="155" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88">GPU 5</text>
      <text x="480" y="175" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">H100</text>
    </g>
    <g id="gpu7">
      <rect x="420" y="240" width="120" height="80" rx="8" fill="#1a2540" stroke="#00ff88" stroke-width="1.5"/>
      <text x="480" y="275" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88">GPU 6</text>
      <text x="480" y="295" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">H100</text>
    </g>
    <g id="gpu8">
      <rect x="420" y="360" width="120" height="80" rx="8" fill="#1a2540" stroke="#00ff88" stroke-width="1.5"/>
      <text x="480" y="395" text-anchor="middle" font-family="monospace" font-size="14" fill="#00ff88">GPU 7</text>
      <text x="480" y="415" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">H100</text>
    </g>
    <g stroke="#00ff88" stroke-width="1.5" opacity="0.6">
      <line x1="340" y1="180" x2="420" y2="40"/>
      <line x1="340" y1="200" x2="420" y2="160"/>
      <line x1="340" y1="240" x2="420" y2="280"/>
      <line x1="340" y1="260" x2="420" y2="400"/>
    </g>
  </g>
  <!-- Bottom stats -->
  <g transform="translate(110, 320)">
    <text x="0" y="0" font-family="'SF Mono', monospace" font-size="18" fill="#00ff88" font-weight="600">900 GB/s</text>
    <text x="0" y="28" font-family="'SF Pro Display', sans-serif" font-size="13" fill="#666">双向带宽</text>
  </g>
  <g transform="translate(280, 320)">
    <text x="0" y="0" font-family="'SF Mono', monospace" font-size="18" fill="#00ff88" font-weight="600">18条</text>
    <text x="0" y="28" font-family="'SF Pro Display', sans-serif" font-size="13" fill="#666">NVLink链路/GPU</text>
  </g>
  <g transform="translate(450, 320)">
    <text x="0" y="0" font-family="'SF Mono', monospace" font-size="18" fill="#00ff88" font-weight="600">4×</text>
    <text x="0" y="28" font-family="'SF Pro Display', sans-serif" font-size="13" fill="#666">NVSwitch层级</text>
  </g>
  <!-- Bottom bar -->
  <rect x="0" y="730" width="1800" height="36" fill="#060a14"/>
  <text x="110" y="754" font-family="'SF Pro Display', sans-serif" font-size="13" fill="#444">AI Infra 专栏 · NVLink 4.0 深度解析</text>
  <text x="1690" y="754" text-anchor="end" font-family="'SF Mono', monospace" font-size="13" fill="#444">2026.07.14</text>
</svg>
