<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1626"/>
    </linearGradient>
    <linearGradient id="barNvlink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00aa55"/>
    </linearGradient>
    <linearGradient id="barInfinity" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc4a20"/>
    </linearGradient>
    <linearGradient id="barPcie" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6c7293"/>
      <stop offset="100%" stop-color="#4a4f6b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="500" fill="url(#bgGrad)"/>
  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">GPU 互连带宽对比 (双向)</text>
  <text x="600" y="65" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="13" fill="#666">数据来源：NVIDIA / AMD 官方 Spec Sheet</text>
  <!-- Y axis -->
  <line x1="120" y1="100" x2="120" y2="420" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="420" x2="1120" y2="420" stroke="#333" stroke-width="1.5"/>
  <!-- Y axis labels and grid lines -->
  <g font-family="'SF Mono', monospace" font-size="11" fill="#555">
    <line x1="120" y1="100" x2="1120" y2="100" stroke="#1a2030" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="110" y="104" text-anchor="end">1000</text>
    <line x1="120" y1="160" x2="1120" y2="160" stroke="#1a2030" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="110" y="164" text-anchor="end">800</text>
    <line x1="120" y1="220" x2="1120" y2="220" stroke="#1a2030" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="110" y="224" text-anchor="end">600</text>
    <line x1="120" y1="280" x2="1120" y2="280" stroke="#1a2030" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="110" y="284" text-anchor="end">400</text>
    <line x1="120" y1="340" x2="1120" y2="340" stroke="#1a2030" stroke-width="1" stroke-dasharray="4,4"/>
    <text x="110" y="344" text-anchor="end">200</text>
    <text x="110" y="424" text-anchor="end">0</text>
  </g>
  <text x="50" y="260" font-family="'SF Pro Display', sans-serif" font-size="12" fill="#666" transform="rotate(-90, 50, 260)">带宽 (GB/s)</text>
  <!-- Bar 1: NVLink 4.0 - 900 GB/s -->
  <!-- Scale: 1 GB/s = 0.32px height. 900 * 0.32 = 288px. y = 420 - 288 = 132 -->
  <rect x="250" y="132" width="160" height="288" rx="6" fill="url(#barNvlink)" filter="url(#glow)"/>
  <text x="330" y="120" text-anchor="middle" font-family="'SF Mono', monospace" font-size="22" font-weight="700" fill="#00ff88">900</text>
  <text x="330" y="440" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="14" font-weight="600" fill="#ffffff">NVLink 4.0</text>
  <text x="330" y="460" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="11" fill="#888">NVIDIA H100 (SXM5)</text>
  <!-- Bar 2: Infinity Fabric - 832 GB/s -->
  <!-- 832 * 0.32 = 266.24px. y = 420 - 266 = 154 -->
  <rect x="540" y="154" width="160" height="266" rx="6" fill="url(#barInfinity)" filter="url(#glow)"/>
  <text x="620" y="142" text-anchor="middle" font-family="'SF Mono', monospace" font-size="22" font-weight="700" fill="#ff6b35">832</text>
  <text x="620" y="440" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="14" font-weight="600" fill="#ffffff">Infinity Fabric</text>
  <text x="620" y="460" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="11" fill="#888">AMD MI300X</text>
  <!-- Bar 3: PCIe 5.0 - 128 GB/s -->
  <!-- 128 * 0.32 = 40.96px. y = 420 - 41 = 379 -->
  <rect x="830" y="379" width="160" height="41" rx="6" fill="url(#barPcie)"/>
  <text x="910" y="367" text-anchor="middle" font-family="'SF Mono', monospace" font-size="22" font-weight="700" fill="#6c7293">128</text>
  <text x="910" y="440" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="14" font-weight="600" fill="#ffffff">PCIe 5.0 x16</text>
  <text x="910" y="460" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="11" fill="#888">通用互连总线</text>
  <!-- Speedup annotations -->
  <g font-family="'SF Mono', monospace" font-size="12" fill="#00ff88" opacity="0.8">
    <text x="490" y="200" text-anchor="middle">7.0×</text>
    <line x1="410" y1="195" x2="540" y2="195" stroke="#00ff88" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  <g font-family="'SF Mono', monospace" font-size="12" fill="#ff6b35" opacity="0.8">
    <text x="780" y="250" text-anchor="middle">6.5×</text>
    <line x1="700" y1="245" x2="830" y2="245" stroke="#ff6b35" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  <!-- Footer note -->
  <text x="600" y="490" text-anchor="middle" font-family="'SF Pro Display', sans-serif" font-size="10" fill="#444">NVLink 4.0 带宽为 H100 SXM5 平台数据 | Infinity Fabric 数据来自 AMD MI300X 官方文档 | PCIe 5.0 x16 理论峰值</text>
</svg>
