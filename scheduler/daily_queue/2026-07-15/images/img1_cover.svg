<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="766" viewBox="0 0 1800 766">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#0f1729"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a"/>
      <stop offset="100%" style="stop-color:#0d1525"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1800" height="766" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="1">
    <line x1="0" y1="100" x2="1800" y2="100"/>
    <line x1="0" y1="200" x2="1800" y2="200"/>
    <line x1="0" y1="300" x2="1800" y2="300"/>
    <line x1="0" y1="400" x2="1800" y2="400"/>
    <line x1="0" y1="500" x2="1800" y2="500"/>
    <line x1="0" y1="600" x2="1800" y2="600"/>
    <line x1="0" y1="700" x2="1800" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="766"/>
    <line x1="400" y1="0" x2="400" y2="766"/>
    <line x1="600" y1="0" x2="600" y2="766"/>
    <line x1="800" y1="0" x2="800" y2="766"/>
    <line x1="1000" y1="0" x2="1000" y2="766"/>
    <line x1="1200" y1="0" x2="1200" y2="766"/>
    <line x1="1400" y1="0" x2="1400" y2="766"/>
    <line x1="1600" y1="0" x2="1600" y2="766"/>
  </g>

  <!-- Left decorative circuit lines -->
  <g stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M 0 350 L 120 350 L 140 330 L 200 330"/>
    <path d="M 0 380 L 80 380 L 100 400 L 180 400"/>
    <circle cx="120" cy="350" r="3" fill="#00d4ff"/>
    <circle cx="180" cy="400" r="3" fill="#00d4ff"/>
  </g>

  <!-- Right decorative circuit lines -->
  <g stroke="#7b2ff7" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M 1800 250 L 1680 250 L 1660 270 L 1600 270"/>
    <path d="M 1800 280 L 1700 280 L 1680 300 L 1620 300"/>
    <circle cx="1680" cy="250" r="3" fill="#7b2ff7"/>
    <circle cx="1620" cy="300" r="3" fill="#7b2ff7"/>
  </g>

  <!-- HBM Stack illustration on the left -->
  <g transform="translate(150, 420)">
    <!-- Base logic layer -->
    <rect x="0" y="200" width="220" height="30" rx="4" fill="#1a3a5a" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="110" y="220" text-anchor="middle" fill="#8ab4f8" font-family="monospace" font-size="11">Logic Base</text>

    <!-- DRAM layers -->
    <rect x="0" y="170" width="220" height="28" rx="3" fill="#162a45" stroke="#00d4ff" stroke-width="1" opacity="0.85"/>
    <rect x="0" y="142" width="220" height="28" rx="3" fill="#162a45" stroke="#00d4ff" stroke-width="1" opacity="0.8"/>
    <rect x="0" y="114" width="220" height="28" rx="3" fill="#162a45" stroke="#00d4ff" stroke-width="1" opacity="0.75"/>
    <rect x="0" y="86" width="220" height="28" rx="3" fill="#162a45" stroke="#00d4ff" stroke-width="1" opacity="0.7"/>
    <rect x="0" y="58" width="220" height="28" rx="3" fill="#162a45" stroke="#00d4ff" stroke-width="1" opacity="0.65"/>
    <rect x="0" y="30" width="220" height="28" rx="3" fill="#162a45" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <rect x="0" y="2" width="220" height="28" rx="3" fill="#162a45" stroke="#00d4ff" stroke-width="1" opacity="0.55"/>

    <!-- TSVs (Through-Silicon Vias) -->
    <circle cx="30" cy="16" r="3" fill="#00d4ff" filter="url(#glow2)"/>
    <circle cx="30" cy="44" r="3" fill="#00d4ff"/>
    <circle cx="30" cy="72" r="3" fill="#00d4ff"/>
    <circle cx="30" cy="100" r="3" fill="#00d4ff"/>
    <circle cx="30" cy="128" r="3" fill="#00d4ff"/>
    <circle cx="30" cy="156" r="3" fill="#00d4ff"/>
    <circle cx="30" cy="184" r="3" fill="#00d4ff"/>
    <circle cx="190" cy="16" r="3" fill="#7b2ff7"/>
    <circle cx="190" cy="44" r="3" fill="#7b2ff7"/>
    <circle cx="190" cy="72" r="3" fill="#7b2ff7"/>
    <circle cx="190" cy="100" r="3" fill="#7b2ff7"/>
    <circle cx="190" cy="128" r="3" fill="#7b2ff7"/>
    <circle cx="190" cy="156" r="3" fill="#7b2ff7"/>
    <circle cx="190" cy="184" r="3" fill="#7b2ff7"/>

    <!-- Label -->
    <text x="110" y="255" text-anchor="middle" fill="#6b7a99" font-family="monospace" font-size="13">HBM3 Stack</text>
    <text x="110" y="275" text-anchor="middle" fill="#4a5a7a" font-family="monospace" font-size="11">8-Hi 3D DRAM</text>
  </g>

  <!-- Main title -->
  <g transform="translate(520, 220)">
    <rect x="-10" y="-70" width="6" height="140" rx="3" fill="url(#accentGrad)" filter="url(#glow)"/>
    <text x="20" y="-20" fill="#ffffff" font-family="sans-serif" font-size="62" font-weight="bold" letter-spacing="2">HBM3</text>
    <text x="20" y="40" fill="#00d4ff" font-family="sans-serif" font-size="42" font-weight="bold" letter-spacing="1">为什么是</text>
    <text x="20" y="90" fill="#ffffff" font-family="sans-serif" font-size="42" font-weight="bold" letter-spacing="1">AI 命脉？</text>
  </g>

  <!-- Key stats badges -->
  <g transform="translate(520, 400)">
    <!-- Badge 1 -->
    <rect x="0" y="0" width="200" height="70" rx="12" fill="url(#chipGrad)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="100" y="28" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="13">BANDWIDTH</text>
    <text x="100" y="55" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold">5.3 TB/s</text>

    <!-- Badge 2 -->
    <rect x="220" y="0" width="200" height="70" rx="12" fill="url(#chipGrad)" stroke="#7b2ff7" stroke-width="1.5"/>
    <text x="320" y="28" text-anchor="middle" fill="#7b2ff7" font-family="monospace" font-size="13">CAPACITY</text>
    <text x="320" y="55" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold">192 GB</text>

    <!-- Badge 3 -->
    <rect x="440" y="0" width="200" height="70" rx="12" fill="url(#chipGrad)" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="540" y="28" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="13">STACK</text>
    <text x="540" y="55" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="22" font-weight="bold">12-Hi</text>
  </g>

  <!-- Bottom tags -->
  <g transform="translate(520, 520)">
    <rect x="0" y="0" width="120" height="32" rx="16" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <text x="60" y="21" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="12">H100</text>

    <rect x="135" y="0" width="140" height="32" rx="16" fill="none" stroke="#7b2ff7" stroke-width="1" opacity="0.6"/>
    <text x="205" y="21" text-anchor="middle" fill="#7b2ff7" font-family="monospace" font-size="12">MI300X</text>

    <rect x="290" y="0" width="130" height="32" rx="16" fill="none" stroke="#00d4ff" stroke-width="1" opacity="0.6"/>
    <text x="355" y="21" text-anchor="middle" fill="#00d4ff" font-family="monospace" font-size="12">Gaudi2</text>
  </g>

  <!-- Right side: bandwidth visualization -->
  <g transform="translate(1180, 150)">
    <text x="200" y="0" text-anchor="middle" fill="#6b7a99" font-family="monospace" font-size="14">MEMORY BANDWIDTH COMPARISON</text>

    <!-- H100 bar -->
    <text x="0" y="55" fill="#8ab4f8" font-family="monospace" font-size="14">H100</text>
    <rect x="80" y="40" width="335" height="28" rx="4" fill="#1a3a5a" stroke="#00d4ff" stroke-width="1"/>
    <rect x="80" y="40" width="223" height="28" rx="4" fill="#00d4ff" opacity="0.4"/>
    <text x="425" y="60" fill="#ffffff" font-family="monospace" font-size="13">3.35 TB/s</text>

    <!-- MI300X bar -->
    <text x="0" y="105" fill="#8ab4f8" font-family="monospace" font-size="14">MI300X</text>
    <rect x="80" y="90" width="335" height="28" rx="4" fill="#2a1a4a" stroke="#7b2ff7" stroke-width="1"/>
    <rect x="80" y="90" width="335" height="28" rx="4" fill="#7b2ff7" opacity="0.4"/>
    <text x="425" y="110" fill="#ffffff" font-family="monospace" font-size="13">5.3 TB/s</text>

    <!-- Gaudi2 bar -->
    <text x="0" y="155" fill="#8ab4f8" font-family="monospace" font-size="14">Gaudi2</text>
    <rect x="80" y="140" width="335" height="28" rx="4" fill="#1a2a3a" stroke="#4a6a9a" stroke-width="1"/>
    <rect x="80" y="140" width="163" height="28" rx="4" fill="#4a6a9a" opacity="0.4"/>
    <text x="425" y="160" fill="#ffffff" font-family="monospace" font-size="13">2.45 TB/s</text>

    <!-- Scale labels -->
    <text x="80" y="195" fill="#4a5a7a" font-family="monospace" font-size="11">0</text>
    <text x="247" y="195" fill="#4a5a7a" font-family="monospace" font-size="11">2.5</text>
    <text x="415" y="195" fill="#4a5a7a" font-family="monospace" font-size="11">5.0 TB/s</text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="755" width="1800" height="2" fill="url(#accentGrad)" opacity="0.5"/>

  <!-- Corner decorations -->
  <g stroke="#00d4ff" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 20 20 L 60 20 L 60 24"/>
    <path d="M 20 20 L 20 60 L 24 60"/>
  </g>
  <g stroke="#7b2ff7" stroke-width="2" fill="none" opacity="0.5">
    <path d="M 1780 746 L 1740 746 L 1740 742"/>
    <path d="M 1780 746 L 1780 706 L 1776 706"/>
  </g>
</svg>