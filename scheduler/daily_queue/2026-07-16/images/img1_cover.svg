<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="766" viewBox="0 0 1800 766" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="svga-cuda-title svga-cuda-desc">
  <title id="svga-cuda-title">CUDA 的护城河有多深？</title>
  <desc id="svga-cuda-desc">NVIDIA CUDA 软件生态护城河分析封面</desc>

  <defs>
    <linearGradient id="svga-cuda-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0B"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </linearGradient>
    <linearGradient id="svga-cuda-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0"/>
      <stop offset="50%" stop-color="#10B981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
    <filter id="svga-cuda-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1800" height="766" fill="url(#svga-cuda-bg)"/>

  <!-- Grid -->
  <g opacity="0.25">
    <line x1="0" y1="191" x2="1800" y2="191" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="383" x2="1800" y2="383" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="575" x2="1800" y2="575" stroke="#1E293B" stroke-width="1"/>
    <line x1="225" y1="0" x2="225" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="675" y1="0" x2="675" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="1125" y1="0" x2="1125" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="1350" y1="0" x2="1350" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="1575" y1="0" x2="1575" y2="766" stroke="#1E293B" stroke-width="1"/>
  </g>

  <rect x="300" y="200" width="1200" height="400" fill="url(#svga-cuda-glow)" filter="url(#svga-cuda-blur)"/>

  <!-- Title -->
  <text x="900" y="200" text-anchor="middle" font-family="Inter, PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="96" font-weight="800" fill="#F8FAFC" letter-spacing="2">CUDA</text>
  <text x="900" y="280" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, Microsoft YaHei, system-ui, sans-serif" font-size="56" font-weight="700" fill="#F8FAFC">护城河有多深？</text>
  <text x="900" y="335" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="28" fill="#94A3B8">15 年生态积累 · 400 万开发者 · 难以撼动的软件壁垒</text>

  <!-- Ecosystem cards -->
  <rect x="250" y="410" width="360" height="130" rx="16" fill="#1A1D24" stroke="#10B981" stroke-width="2"/>
  <rect x="250" y="410" width="360" height="4" rx="2" fill="#10B981"/>
  <text x="430" y="455" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#10B981">NVIDIA CUDA</text>
  <text x="430" y="490" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="18" fill="#94A3B8">cuDNN · cuBLAS · NCCL · TensorRT</text>
  <text x="430" y="518" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="16" fill="#64748B">400万+开发者 · 200+框架原生支持</text>

  <rect x="720" y="410" width="360" height="130" rx="16" fill="#1A1D24" stroke="#F59E0B" stroke-width="2"/>
  <rect x="720" y="410" width="360" height="4" rx="2" fill="#F59E0B"/>
  <text x="900" y="455" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#F59E0B">AMD ROCm</text>
  <text x="900" y="490" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="18" fill="#94A3B8">MIOpen · rocBLAS · RCCL</text>
  <text x="900" y="518" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="16" fill="#64748B">追赶中 · PyTorch 原生支持 v2.0+</text>

  <rect x="1190" y="410" width="360" height="130" rx="16" fill="#1A1D24" stroke="#3B82F6" stroke-width="2"/>
  <rect x="1190" y="410" width="360" height="4" rx="2" fill="#3B82F6"/>
  <text x="1370" y="455" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="28" font-weight="700" fill="#3B82F6">Intel oneAPI</text>
  <text x="1370" y="490" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="18" fill="#94A3B8">oneDNN · oneMKL · SYCL</text>
  <text x="1370" y="518" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="16" fill="#64748B">跨架构愿景 · Gaudi 加速器实践</text>

  <!-- Bottom -->
  <text x="900" y="620" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="22" font-weight="600" fill="#475569">硬件可以追赶，生态才是壁垒</text>

