<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" width="1200" height="640" font-family="Helvetica, Arial, sans-serif">
  <rect width="1200" height="640" fill="#ffffff"/>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" font-size="28" font-weight="bold" fill="#1e293b">CUDA 在 AI Infra 软件栈中的位置</text>

  <!-- App Layer -->
  <rect x="100" y="70" width="1000" height="70" rx="4" fill="#fed7aa" stroke="#c2410c" stroke-width="2"/>
  <text x="600" y="105" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#1e293b">Application Layer: LLM 训练/推理 (Megatron-LM, DeepSpeed, vLLM, LangGraph)</text>

  <!-- Arrow 1 -->
  <line x1="600" y1="140" x2="600" y2="170" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Framework Layer -->
  <rect x="100" y="170" width="1000" height="70" rx="4" fill="#dcfce7" stroke="#166534" stroke-width="2"/>
  <text x="600" y="205" text-anchor="middle" dominant-baseline="central" font-size="20" fill="#1e293b">Framework: PyTorch 2.0 / TensorFlow / JAX</text>

  <!-- Arrow 2 -->
  <line x1="600" y1="240" x2="600" y2="270" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- CUDA Libraries -->
  <rect x="100" y="270" width="1000" height="90" rx="4" fill="#d1fae5" stroke="#10B981" stroke-width="2"/>
  <text x="600" y="315" text-anchor="middle" dominant-baseline="central" font-size="16" fill="#1e293b">CUDA Libraries: cuDNN (深度学习) | cuBLAS (线性代数) | NCCL (多卡通信) | TensorRT (推理优化)</text>

  <!-- Arrow 3 -->
  <line x1="600" y1="360" x2="600" y2="390" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- CUDA Runtime -->
  <rect x="100" y="390" width="1000" height="60" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="600" y="420" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#1e293b">CUDA Runtime (cudart) + Driver (CUDA Driver API)</text>

  <!-- Arrow 4 -->
  <line x1="600" y1="450" x2="600" y2="480" stroke="#475569" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- GPU Hardware -->
  <rect x="100" y="480" width="1000" height="60" rx="4" fill="#f3e8ff" stroke="#6b21a8" stroke-width="2"/>
  <text x="600" y="510" text-anchor="middle" dominant-baseline="central" font-size="18" fill="#1e293b">GPU Hardware: NVIDIA H100 / A100 / AMD MI300X (via HIP compatibility)</text>

  <!-- Note -->
  <text x="600" y="580" text-anchor="middle" font-size="16" fill="#64748b">护城河核心：cuDNN/cuBLAS 经过 15 年深度优化，与 NVIDIA GPU 微架构深度耦合</text>

  <!-- Source -->
  <text x="600" y="615" text-anchor="middle" font-size="12" fill="#94a3b8">来源：NVIDIA CUDA Toolkit Documentation / PyTorch Official</text>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
  </defs>
</svg>