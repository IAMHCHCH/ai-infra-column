<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="svga-eco-title svga-eco-desc">
  <title id="svga-eco-title">CUDA vs ROCm vs oneAPI 生态对比</title>
  <desc id="svga-eco-desc">三大 GPU 软件栈生态功能覆盖率矩阵</desc>

  <rect x="0" y="0" width="1200" height="500" fill="#111418"/>

  <text x="600" y="35" text-anchor="middle" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="28" font-weight="700" fill="#F1F5F9">CUDA vs ROCm vs oneAPI 生态对比</text>
  <text x="600" y="60" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#64748B">数据来源：NVIDIA / AMD / Intel 官方文档 (2024)</text>

  <!-- Column headers -->
  <text x="200" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700" fill="#94A3B8">功能维度</text>
  <text x="500" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#10B981">CUDA 12.x</text>
  <text x="800" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#F59E0B">ROCm 6.0</text>
  <text x="1050" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="700" fill="#3B82F6">oneAPI</text>

  <!-- Row backgrounds -->
  <rect x="60" y="115" width="1120" height="45" rx="4" fill="#1A1D24"/>
  <rect x="60" y="165" width="1120" height="45" rx="4" fill="#111418"/>
  <rect x="60" y="215" width="1120" height="45" rx="4" fill="#1A1D24"/>
  <rect x="60" y="265" width="1120" height="45" rx="4" fill="#111418"/>
  <rect x="60" y="315" width="1120" height="45" rx="4" fill="#1A1D24"/>
  <rect x="60" y="365" width="1120" height="45" rx="4" fill="#111418"/>

  <!-- Row 1: Deep Learning Primitives -->
  <text x="200" y="143" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#F1F5F9">深度学习算子 (DNN)</text>
  <rect x="470" y="122" width="60" height="30" rx="15" fill="#10B981"/><text x="500" y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★★</text>
  <rect x="770" y="122" width="60" height="30" rx="15" fill="#F59E0B"/><text x="800" y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★☆</text>
  <rect x="1020" y="122" width="60" height="30" rx="15" fill="#3B82F6"/><text x="1050" y="142" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★☆</text>

  <!-- Row 2: BLAS -->
  <text x="200" y="193" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#F1F5F9">线性代数 (BLAS)</text>
  <rect x="470" y="172" width="60" height="30" rx="15" fill="#10B981"/><text x="500" y="192" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★★</text>
  <rect x="770" y="172" width="60" height="30" rx="15" fill="#10B981"/><text x="800" y="192" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★★</text>
  <rect x="1020" y="172" width="60" height="30" rx="15" fill="#10B981"/><text x="1050" y="192" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★★</text>

  <!-- Row 3: Multi-GPU Comm -->
  <text x="200" y="243" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#F1F5F9">多卡通信 (NCCL)</text>
  <rect x="470" y="222" width="60" height="30" rx="15" fill="#10B981"/><text x="500" y="242" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★★</text>
  <rect x="770" y="222" width="60" height="30" rx="15" fill="#F59E0B"/><text x="800" y="242" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★☆</text>
  <rect x="1020" y="222" width="60" height="30" rx="15" fill="#EF4444"/><text x="1050" y="242" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★☆☆</text>

  <!-- Row 4: Inference Optimization -->
  <text x="200" y="293" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#F1F5F9">推理优化 (TensorRT)</text>
  <rect x="470" y="272" width="60" height="30" rx="15" fill="#10B981"/><text x="500" y="292" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★★</text>
  <rect x="770" y="272" width="60" height="30" rx="15" fill="#F59E0B"/><text x="800" y="292" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★☆☆</text>
  <rect x="1020" y="272" width="60" height="30" rx="15" fill="#F59E0B"/><text x="1050" y="292" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★☆☆</text>

  <!-- Row 5: Framework Support -->
  <text x="200" y="343" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#F1F5F9">框架原生支持</text>
  <rect x="470" y="322" width="60" height="30" rx="15" fill="#10B981"/><text x="500" y="342" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★★</text>
  <rect x="770" y="322" width="60" height="30" rx="15" fill="#10B981"/><text x="800" y="342" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★★</text>
  <rect x="1020" y="322" width="60" height="30" rx="15" fill="#F59E0B"/><text x="1050" y="342" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★☆</text>

  <!-- Row 6: Developer Community -->
  <text x="200" y="393" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#F1F5F9">开发者社区规模</text>
  <rect x="470" y="372" width="60" height="30" rx="15" fill="#10B981"/><text x="500" y="392" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★★★</text>
  <rect x="770" y="372" width="60" height="30" rx="15" fill="#EF4444"/><text x="800" y="392" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★☆☆</text>
  <rect x="1020" y="372" width="60" height="30" rx="15" fill="#EF4444"/><text x="1050" y="392" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#0A0A0B">★☆☆</text>

  <!-- Legend -->
  <rect x="60" y="430" width="1080" height="50" rx="8" fill="#1A1D24" stroke="#2A2D35" stroke-width="1"/>
  <text x="100" y="455" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#10B981">★★★</text>
  <text x="155" y="455" font-family="PingFang SC, system-ui, sans-serif" font-size="13" fill="#94A3B8">完整支持</text>
  <text x="280" y="455" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#F59E0B">★★☆</text>
  <text x="335" y="455" font-family="PingFang SC, system-ui, sans-serif" font-size="13" fill="#94A3B8">部分支持</text>
  <text x="460" y="455" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#EF4444">★☆☆</text>
  <text x="515" y="455" font-family="PingFang SC, system-ui, sans-serif" font-size="13" fill="#94A3B8">初级阶段</text>
  <text x="640" y="455" font-family="PingFang SC, system-ui, sans-serif" font-size="13" fill="#64748B">| CUDA 开发者 400万+ | ROCm 开发者 ~50万 | oneAPI 开发者 ~20万</text>
  <text x="100" y="475" font-family="PingFang SC, system-ui, sans-serif" font-size="12" fill="#64748B">关键差距：推理优化和多卡通信是 ROCm/oneAPI 的最大短板</text>
</svg>
