<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="766" viewBox="0 0 1800 766">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0e1a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSmall">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1800" height="766" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#64748b" stroke-width="1">
    <line x1="0" y1="100" x2="1800" y2="100"/>
    <line x1="0" y1="200" x2="1800" y2="200"/>
    <line x1="0" y1="300" x2="1800" y2="300"/>
    <line x1="0" y1="400" x2="1800" y2="400"/>
    <line x1="0" y1="500" x2="1800" y2="500"/>
    <line x1="0" y1="600" x2="1800" y2="600"/>
    <line x1="0" y1="700" x2="1800" y2="700"/>
    <line x1="200" y1="0" x2="200" y2="766"/>
    <line x1="400" y1="0" x2="400" y2="766"/>
    <line x1="600" y1="0" x2="600" y2="766"/>
    <line x1="800" y1="0" x2="800" y2="766"/>
    <line x1="1000" y1="0" x2="1000" y2="766"/>
    <line x1="1200" y1="0" x2="1200" y2="766"/>
    <line x1="1400" y1="0" x2="1400" y2="766"/>
    <line x1="1600" y1="0" x2="1600" y2="766"/>
  </g>

  <!-- Decorative chip icons row -->
  <g transform="translate(80, 80)">
    <!-- Chip 1: NVIDIA -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="url(#chipGrad)" stroke="#76b900" stroke-width="2"/>
      <text x="35" y="42" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#76b900">NV</text>
      <line x1="-5" y1="15" x2="0" y2="15" stroke="#76b900" stroke-width="2"/>
      <line x1="-5" y1="35" x2="0" y2="35" stroke="#76b900" stroke-width="2"/>
      <line x1="-5" y1="55" x2="0" y2="55" stroke="#76b900" stroke-width="2"/>
      <line x1="70" y1="15" x2="75" y2="15" stroke="#76b900" stroke-width="2"/>
      <line x1="70" y1="35" x2="75" y2="35" stroke="#76b900" stroke-width="2"/>
      <line x1="70" y1="55" x2="75" y2="55" stroke="#76b900" stroke-width="2"/>
    </g>
    <!-- Chip 2: AMD -->
    <g transform="translate(110, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="url(#chipGrad)" stroke="#ed1c24" stroke-width="2"/>
      <text x="35" y="42" text-anchor="middle" font-family="monospace" font-size="16" font-weight="bold" fill="#ed1c24">AMD</text>
      <line x1="-5" y1="15" x2="0" y2="15" stroke="#ed1c24" stroke-width="2"/>
      <line x1="-5" y1="35" x2="0" y2="35" stroke="#ed1c24" stroke-width="2"/>
      <line x1="-5" y1="55" x2="0" y2="55" stroke="#ed1c24" stroke-width="2"/>
      <line x1="70" y1="15" x2="75" y2="15" stroke="#ed1c24" stroke-width="2"/>
      <line x1="70" y1="35" x2="75" y2="35" stroke="#ed1c24" stroke-width="2"/>
      <line x1="70" y1="55" x2="75" y2="55" stroke="#ed1c24" stroke-width="2"/>
    </g>
    <!-- Chip 3: Intel -->
    <g transform="translate(220, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="url(#chipGrad)" stroke="#0071c5" stroke-width="2"/>
      <text x="35" y="42" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#0071c5">INT</text>
      <line x1="-5" y1="15" x2="0" y2="15" stroke="#0071c5" stroke-width="2"/>
      <line x1="-5" y1="35" x2="0" y2="35" stroke="#0071c5" stroke-width="2"/>
      <line x1="-5" y1="55" x2="0" y2="55" stroke="#0071c5" stroke-width="2"/>
      <line x1="70" y1="15" x2="75" y2="15" stroke="#0071c5" stroke-width="2"/>
      <line x1="70" y1="35" x2="75" y2="35" stroke="#0071c5" stroke-width="2"/>
      <line x1="70" y1="55" x2="75" y2="55" stroke="#0071c5" stroke-width="2"/>
    </g>
    <!-- Chip 4: Google TPU -->
    <g transform="translate(330, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="url(#chipGrad)" stroke="#4285f4" stroke-width="2"/>
      <text x="35" y="42" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#4285f4">TPU</text>
      <line x1="-5" y1="15" x2="0" y2="15" stroke="#4285f4" stroke-width="2"/>
      <line x1="-5" y1="35" x2="0" y2="35" stroke="#4285f4" stroke-width="2"/>
      <line x1="-5" y1="55" x2="0" y2="55" stroke="#4285f4" stroke-width="2"/>
      <line x1="70" y1="15" x2="75" y2="15" stroke="#4285f4" stroke-width="2"/>
      <line x1="70" y1="35" x2="75" y2="35" stroke="#4285f4" stroke-width="2"/>
      <line x1="70" y1="55" x2="75" y2="55" stroke="#4285f4" stroke-width="2"/>
    </g>
    <!-- Chip 5: AWS -->
    <g transform="translate(440, 0)">
      <rect x="0" y="0" width="70" height="70" rx="10" fill="url(#chipGrad)" stroke="#ff9900" stroke-width="2"/>
      <text x="35" y="42" text-anchor="middle" font-family="monospace" font-size="12" font-weight="bold" fill="#ff9900">AWS</text>
      <line x1="-5" y1="15" x2="0" y2="15" stroke="#ff9900" stroke-width="2"/>
      <line x1="-5" y1="35" x2="0" y2="35" stroke="#ff9900" stroke-width="2"/>
      <line x1="-5" y1="55" x2="0" y2="55" stroke="#ff9900" stroke-width="2"/>
      <line x1="70" y1="15" x2="75" y2="15" stroke="#ff9900" stroke-width="2"/>
      <line x1="70" y1="35" x2="75" y2="35" stroke="#ff9900" stroke-width="2"/>
      <line x1="70" y1="55" x2="75" y2="55" stroke="#ff9900" stroke-width="2"/>
    </g>
  </g>

  <!-- Right side decorative dots -->
  <g transform="translate(1620, 80)">
    <circle cx="0" cy="0" r="4" fill="#06b6d4" opacity="0.6"/>
    <circle cx="30" cy="20" r="3" fill="#8b5cf6" opacity="0.5"/>
    <circle cx="60" cy="-10" r="5" fill="#ec4899" opacity="0.4"/>
    <circle cx="90" cy="30" r="3" fill="#06b6d4" opacity="0.5"/>
    <circle cx="120" cy="5" r="4" fill="#8b5cf6" opacity="0.6"/>
    <circle cx="45" cy="50" r="3" fill="#ec4899" opacity="0.5"/>
    <circle cx="100" cy="60" r="4" fill="#06b6d4" opacity="0.4"/>
    <circle cx="15" cy="70" r="3" fill="#8b5cf6" opacity="0.5"/>
  </g>

  <!-- Accent line top -->
  <rect x="140" y="210" width="80" height="4" rx="2" fill="url(#accentGrad)"/>

  <!-- Main Title -->
  <text x="140" y="300" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="84" font-weight="900" fill="#f1f5f9" letter-spacing="2">
    AI 芯片百花齐放
  </text>

  <!-- Subtitle -->
  <text x="144" y="370" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="400" fill="#94a3b8" letter-spacing="1">
    从 NVIDIA 一枝独秀到多元算力生态
  </text>

  <!-- Tagline -->
  <text x="144" y="430" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="300" fill="#64748b" letter-spacing="2">
    NVIDIA · AMD · Intel · Google TPU · AWS Trainium · 鲲鹏 · 昇腾
  </text>

  <!-- Bottom accent bar -->
  <rect x="140" y="500" width="600" height="2" rx="1" fill="url(#accentGrad)" opacity="0.4"/>

  <!-- Bottom labels -->
  <g transform="translate(140, 540)">
    <rect x="0" y="0" width="120" height="40" rx="20" fill="#1e293b" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="60" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#06b6d4">MLPerf</text>

    <rect x="140" y="0" width="100" height="40" rx="20" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="190" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#8b5cf6">生态图</text>

    <rect x="260" y="0" width="120" height="40" rx="20" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
    <text x="320" y="26" text-anchor="middle" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#ec4899">架构对比</text>
  </g>

  <!-- Decorative circuit lines -->
  <g opacity="0.15" stroke="#06b6d4" stroke-width="1.5" fill="none">
    <path d="M 900 200 L 1100 200 L 1100 280 L 1300 280"/>
    <path d="M 900 250 L 1050 250 L 1050 330 L 1250 330 L 1250 400"/>
    <path d="M 900 350 L 1150 350 L 1150 450 L 1400 450"/>
    <circle cx="1100" cy="200" r="4" fill="#06b6d4"/>
    <circle cx="1250" cy="330" r="4" fill="#8b5cf6"/>
    <circle cx="1150" cy="350" r="4" fill="#ec4899"/>
    <circle cx="1300" cy="280" r="4" fill="#06b6d4"/>
    <circle cx="1400" cy="450" r="4" fill="#8b5cf6"/>
  </g>

  <!-- Right side large decorative element: stylized chip -->
  <g transform="translate(1200, 200)" opacity="0.12">
    <rect x="0" y="0" width="350" height="350" rx="30" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <rect x="40" y="40" width="270" height="270" rx="20" fill="none" stroke="#8b5cf6" stroke-width="2"/>
    <rect x="80" y="80" width="190" height="190" rx="15" fill="none" stroke="#ec4899" stroke-width="2"/>
    <rect x="120" y="120" width="110" height="110" rx="10" fill="none" stroke="#06b6d4" stroke-width="2"/>
    <!-- Pin lines -->
    <g stroke="#64748b" stroke-width="2">
      <line x1="-10" y1="50" x2="0" y2="50"/>
      <line x1="-10" y1="100" x2="0" y2="100"/>
      <line x1="-10" y1="150" x2="0" y2="150"/>
      <line x1="-10" y1="200" x2="0" y2="200"/>
      <line x1="-10" y1="250" x2="0" y2="250"/>
      <line x1="-10" y1="300" x2="0" y2="300"/>
      <line x1="350" y1="50" x2="360" y2="50"/>
      <line x1="350" y1="100" x2="360" y2="100"/>
      <line x1="350" y1="150" x2="360" y2="150"/>
      <line x1="350" y1="200" x2="360" y2="200"/>
      <line x1="350" y1="250" x2="360" y2="250"/>
      <line x1="350" y1="300" x2="360" y2="300"/>
      <line x1="50" y1="-10" x2="50" y2="0"/>
      <line x1="100" y1="-10" x2="100" y2="0"/>
      <line x1="150" y1="-10" x2="150" y2="0"/>
      <line x1="200" y1="-10" x2="200" y2="0"/>
      <line x1="250" y1="-10" x2="250" y2="0"/>
      <line x1="300" y1="-10" x2="300" y2="0"/>
      <line x1="50" y1="350" x2="50" y2="360"/>
      <line x1="100" y1="350" x2="100" y2="360"/>
      <line x1="150" y1="350" x2="150" y2="360"/>
      <line x1="200" y1="350" x2="200" y2="360"/>
      <line x1="250" y1="350" x2="250" y2="360"/>
      <line x1="300" y1="350" x2="300" y2="360"/>
    </g>
  </g>

  <!-- Bottom info -->
  <text x="900" y="700" font-family="system-ui, -apple-system, 'PingFang SC', sans-serif" font-size="14" fill="#475569" letter-spacing="3">
    AI INFRA COLUMN · 行业多样性观察
  </text>
  <text x="1660" y="700" text-anchor="end" font-family="system-ui, sans-serif" font-size="14" fill="#475569" letter-spacing="1">
    2026.07.17
  </text>
</svg>
