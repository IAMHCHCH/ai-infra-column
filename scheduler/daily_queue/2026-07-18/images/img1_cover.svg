<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="766" viewBox="0 0 1800 766" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="svga-gloss-title svga-gloss-desc">
  <title id="svga-gloss-title">AI Infra 术语速查表</title>
  <desc id="svga-gloss-desc">第一周核心术语表与论文推荐封面</desc>

  <defs>
    <linearGradient id="svga-gloss-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0B"/>
      <stop offset="50%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#0A0A0B"/>
    </linearGradient>
    <linearGradient id="svga-gloss-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </linearGradient>
    <filter id="svga-gloss-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1800" height="766" fill="url(#svga-gloss-bg)"/>

  <!-- Grid -->
  <g opacity="0.25">
    <line x1="0" y1="191" x2="1800" y2="191" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="383" x2="1800" y2="383" stroke="#1E293B" stroke-width="1"/>
    <line x1="0" y1="575" x2="1800" y2="575" stroke="#1E293B" stroke-width="1"/>
    <line x1="225" y1="0" x2="225" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="450" y1="0" x2="450" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="675" y1="0" x2="675" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="900" y1="0" x2="900" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="1125" y1="0" x2="1125" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="1350" y1="0" x2="1350" y2="766" stroke="#1E293B" stroke-width="1"/>
    <line x1="1575" y1="0" x2="1575" y2="766" stroke="#1E293B" stroke-width="1"/>
  </g>

  <rect x="300" y="200" width="1200" height="400" fill="url(#svga-gloss-glow)" filter="url(#svga-gloss-blur)"/>

  <!-- Title -->
  <text x="900" y="220" text-anchor="middle" font-family="Inter, PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="96" font-weight="800" fill="#F8FAFC" letter-spacing="2">
    AI Infra
  </text>
  <text x="900" y="300" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, Microsoft YaHei, system-ui, sans-serif" font-size="56" font-weight="700" fill="#F8FAFC">
    术语速查表
  </text>
  <text x="900" y="350" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="28" fill="#94A3B8">
    第一周 10 个核心术语 + 3 篇必读论文
  </text>

  <!-- Term pills -->
  <rect x="300" y="440" width="180" height="50" rx="25" fill="#1A1D24" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="390" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#3B82F6">NVLink</text>

  <rect x="510" y="440" width="180" height="50" rx="25" fill="#1A1D24" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="600" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#8B5CF6">HBM3</text>

  <rect x="720" y="440" width="180" height="50" rx="25" fill="#1A1D24" stroke="#10B981" stroke-width="1.5"/>
  <text x="810" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#10B981">CUDA</text>

  <rect x="930" y="440" width="180" height="50" rx="25" fill="#1A1D24" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="1020" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#F59E0B">ROCm</text>

  <rect x="1140" y="440" width="180" height="50" rx="25" fill="#1A1D24" stroke="#EF4444" stroke-width="1.5"/>
  <text x="1230" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#EF4444">InfiniBand</text>

  <rect x="1350" y="440" width="180" height="50" rx="25" fill="#1A1D24" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="1440" y="472" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="600" fill="#3B82F6">oneAPI</text>

  <!-- Bottom -->
  <text x="900" y="600" text-anchor="middle" font-family="PingFang SC, Noto Sans SC, system-ui, sans-serif" font-size="22" font-weight="600" fill="#475569">
    硬核术语 · 一图掌握 · 论文附赠
  </text>

  <!-- Corner markers -->
  <rect x="40" y="40" width="3" height="30" fill="#3B82F6" opacity="0.5"/>
  <rect x="40" y="40" width="30" height="3" fill="#3B82F6" opacity="0.5"/>
  <rect x="1757" y="40" width="3" height="30" fill="#8B5CF6" opacity="0.5"/>
  <rect x="1730" y="40" width="30" height="3" fill="#8B5CF6" opacity="0.5"/>
  <rect x="40" y="696" width="3" height="30" fill="#8B5CF6" opacity="0.5"/>
  <rect x="40" y="723" width="30" height="3" fill="#8B5CF6" opacity="0.5"/>
  <rect x="1757" y="696" width="3" height="30" fill="#3B82F6" opacity="0.5"/>
  <rect x="1730" y="723" width="30" height="3" fill="#3B82F6" opacity="0.5"/>
</svg>
