<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="svga-term1-title svga-term1-desc">
  <title id="svga-term1-title">核心术语卡片 (1/4)</title>
  <desc id="svga-term1-desc">NVLink, NVSwitch, HBM3, CUDA 术语解释</desc>

  <rect x="0" y="0" width="1200" height="500" fill="#111418"/>

  <text x="600" y="35" text-anchor="middle" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="28" font-weight="700" fill="#F1F5F9">AI Infra 核心术语卡片 (1/4)</text>

  <!-- Card 1: NVLink -->
  <rect x="40" y="70" width="270" height="180" rx="12" fill="#1A1D24" stroke="#3B82F6" stroke-width="2"/>
  <rect x="40" y="70" width="270" height="4" rx="2" fill="#3B82F6"/>
  <text x="60" y="105" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#3B82F6">NVLink</text>
  <text x="60" y="135" font-family="PingFang SC, system-ui, sans-serif" font-size="16" fill="#F1F5F9">NVIDIA 专用 GPU 互联总线</text>
  <text x="60" y="165" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">NVLink 4.0 提供 900 GB/s</text>
  <text x="60" y="190" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">双向带宽，是 PCIe 5.0</text>
  <text x="60" y="215" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">的 7 倍。解决多卡训练</text>
  <text x="60" y="240" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">中的数据搬运瓶颈。</text>

  <!-- Card 2: NVSwitch -->
  <rect x="330" y="70" width="270" height="180" rx="12" fill="#1A1D24" stroke="#8B5CF6" stroke-width="2"/>
  <rect x="330" y="70" width="270" height="4" rx="2" fill="#8B5CF6"/>
  <text x="350" y="105" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#8B5CF6">NVSwitch</text>
  <text x="350" y="135" font-family="PingFang SC, system-ui, sans-serif" font-size="16" fill="#F1F5F9">NVLink 交叉开关交换器</text>
  <text x="350" y="165" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">实现机架内所有 GPU 的</text>
  <text x="350" y="190" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">全互联（all-to-all）。</text>
  <text x="350" y="215" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">DGX H100 使用 4 个</text>
  <text x="350" y="240" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">L2 NVSwitch 连接 8 卡。</text>

  <!-- Card 3: HBM3 -->
  <rect x="620" y="70" width="270" height="180" rx="12" fill="#1A1D24" stroke="#10B981" stroke-width="2"/>
  <rect x="620" y="70" width="270" height="4" rx="2" fill="#10B981"/>
  <text x="640" y="105" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#10B981">HBM3</text>
  <text x="640" y="135" font-family="PingFang SC, system-ui, sans-serif" font-size="16" fill="#F1F5F9">高带宽内存第三代</text>
  <text x="640" y="165" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">3D 堆叠 DRAM + TSV 硅</text>
  <text x="640" y="190" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">穿孔技术。H100: 80GB</text>
  <text x="640" y="215" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">3.35TB/s; MI300X: 192GB</text>
  <text x="640" y="240" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">5.3TB/s。LLM 推理瓶颈。</text>

  <!-- Card 4: CUDA -->
  <rect x="910" y="70" width="270" height="180" rx="12" fill="#1A1D24" stroke="#F59E0B" stroke-width="2"/>
  <rect x="910" y="70" width="270" height="4" rx="2" fill="#F59E0B"/>
  <text x="930" y="105" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="700" fill="#F59E0B">CUDA</text>
  <text x="930" y="135" font-family="PingFang SC, system-ui, sans-serif" font-size="16" fill="#F1F5F9">NVIDIA 并行计算平台</text>
  <text x="930" y="165" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">包含 cuDNN/cuBLAS/NCCL</text>
  <text x="930" y="190" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">等库，是 GPU 编程的</text>
  <text x="930" y="215" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">事实标准。护城河来自</text>
  <text x="930" y="240" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#94A3B8">15年开发者生态积累。</text>

  <!-- Divider -->
  <line x1="40" y1="290" x2="1160" y2="290" stroke="#2A2D35" stroke-width="1"/>

  <!-- Paper recommendations title -->
  <text x="600" y="320" text-anchor="middle" font-family="Inter, PingFang SC, system-ui, sans-serif" font-size="22" font-weight="700" fill="#F1F5F9">📚 本周必读论文</text>

  <!-- Paper 1 -->
  <rect x="40" y="340" width="360" height="60" rx="8" fill="#1A1D24" stroke="#3B82F6" stroke-width="1"/>
  <text x="60" y="365" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#3B82F6">[1] NVIDIA Hopper Whitepaper</text>
  <text x="60" y="385" font-family="PingFang SC, system-ui, sans-serif" font-size="13" fill="#94A3B8">H100 架构全解析：Transformer Engine + FP8</text>

  <!-- Paper 2 -->
  <rect x="420" y="340" width="360" height="60" rx="8" fill="#1A1D24" stroke="#8B5CF6" stroke-width="1"/>
  <text x="440" y="365" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#8B5CF6">[2] AMD MI300X Whitepaper</text>
  <text x="440" y="385" font-family="PingFang SC, system-ui, sans-serif" font-size="13" fill="#94A3B8">192GB HBM3 + CDNA3 架构详解</text>

  <!-- Paper 3 -->
  <rect x="800" y="340" width="360" height="60" rx="8" fill="#1A1D24" stroke="#10B981" stroke-width="1"/>
  <text x="820" y="365" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#10B981">[3] MLPerf Inference v4.0</text>
  <text x="820" y="385" font-family="PingFang SC, system-ui, sans-serif" font-size="13" fill="#94A3B8">行业基准测试：H100/MI300X/Gaudi3 实测对比</text>

  <!-- Bottom -->
  <text x="600" y="440" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="14" fill="#64748B">下周预告：推理优化（vLLM/Continuous Batching）+ 网络互联（InfiniBand vs RoCE）</text>
  <text x="600" y="470" text-anchor="middle" font-family="PingFang SC, system-ui, sans-serif" font-size="12" fill="#475569">数据来源：NVIDIA/AMD/Intel 官方白皮书 · MLPerf 基准榜单</text>
</svg>
